<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1117">
<title>Panel Entrenadores · ATG</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --teal:    #27F9D4;
  --pink:    #FF729F;
  --yellow:  #F0F66E;
  --purple:  #a78bfa;
  --bg:      #0f1117;
  --surface: #161c26;
  --card:    #1c2535;
  --border:  rgba(39,249,212,.12);
  --text:    #e8edf4;
  --muted:   #8a97aa;
  --success: #10b981;
  --danger:  #ef4444;
  --warning: #f59e0b;
  --radius:  14px;
  --r-sm:    8px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden}

/* ── Background mesh ── */
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 60% 50% at 20% 10%,rgba(39,249,212,.06) 0%,transparent 60%),
             radial-gradient(ellipse 50% 40% at 80% 80%,rgba(255,114,159,.06) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}

/* ─── LOGIN ─── */
#loginScreen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:1.5rem;position:relative;z-index:1;
}
.login-card{
  background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:2.5rem 2rem;width:100%;max-width:380px;
  box-shadow:0 24px 60px rgba(0,0,0,.5);
  animation:fadeUp .4s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

.login-logo{
  display:flex;align-items:center;gap:.75rem;margin-bottom:2rem;
}
.login-logo .logo-icon{
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,var(--teal),#1ac4a8);
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;color:#0f1117;font-weight:800;flex-shrink:0;
}
.login-logo h2{
  font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:700;
  color:var(--teal);line-height:1.15;
}
.login-logo small{font-size:.72rem;color:var(--muted);display:block;font-weight:400}

.login-title{
  font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;
  margin-bottom:.35rem;
}
.login-sub{font-size:.85rem;color:var(--muted);margin-bottom:1.75rem}

.form-label-custom{
  font-size:.75rem;font-weight:600;letter-spacing:.06em;
  text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;display:block;
}
.form-input{
  width:100%;background:#111827;border:1.5px solid rgba(255,255,255,.08);
  color:var(--text);border-radius:10px;padding:.7rem 1rem;font-size:.95rem;
  font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;
}
.form-input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(39,249,212,.12)}
.form-input::placeholder{color:#3d4d60}

.input-wrap{position:relative}
.input-icon{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.85rem}
.form-input.has-icon{padding-left:2.5rem}

.btn-login{
  width:100%;background:linear-gradient(135deg,var(--teal),#1ac4a8);
  color:#0f1117;border:none;border-radius:10px;padding:.8rem 1rem;
  font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;
  transition:opacity .2s,transform .1s;margin-top:1.25rem;
}
.btn-login:hover{opacity:.9;transform:translateY(-1px)}
.btn-login:disabled{opacity:.45;cursor:not-allowed;transform:none}

.login-error{
  background:rgba(239,68,68,.12);border:1.5px solid var(--danger);
  border-radius:8px;padding:.6rem .9rem;font-size:.83rem;color:#fca5a5;
  margin-top:.85rem;display:none;
}

/* ─── APP ─── */
#appScreen{display:none;position:relative;z-index:1}

.app-header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:.75rem 1.25rem;display:flex;align-items:center;
  justify-content:space-between;gap:.75rem;
  position:sticky;top:0;z-index:50;
}
.header-brand{display:flex;align-items:center;gap:.65rem}
.header-brand .hicon{
  width:36px;height:36px;border-radius:9px;
  background:linear-gradient(135deg,var(--teal),#1ac4a8);
  display:flex;align-items:center;justify-content:center;
  font-size:.9rem;color:#0f1117;font-weight:800;
}
.header-brand h1{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:var(--teal);line-height:1.1}
.header-brand small{font-size:.7rem;color:var(--muted);display:block}

.badge-diana{
  background:linear-gradient(135deg,var(--teal),#1ac4a8);
  color:#0f1117;font-weight:700;font-size:.7rem;
  padding:.28em .7em;border-radius:20px;
  font-family:'Syne',sans-serif;letter-spacing:.03em;
}

.btn-logout{
  background:transparent;border:1.5px solid rgba(255,255,255,.1);
  color:var(--muted);border-radius:8px;padding:.35rem .7rem;
  font-size:.78rem;cursor:pointer;transition:all .2s;
}
.btn-logout:hover{border-color:var(--danger);color:var(--danger)}

/* ─── NAV TABS ─── */
.view-tabs{
  display:flex;gap:.4rem;padding:.75rem 1rem;overflow-x:auto;
  border-bottom:1px solid var(--border);
}
.view-tabs::-webkit-scrollbar{display:none}
.vtab{
  background:transparent;border:1.5px solid var(--border);
  color:var(--muted);border-radius:8px;padding:.38rem .8rem;
  font-size:.8rem;font-weight:600;cursor:pointer;white-space:nowrap;
  transition:all .2s;font-family:'DM Sans',sans-serif;
}
.vtab.active{
  background:rgba(39,249,212,.12);border-color:var(--teal);color:var(--teal);
}

/* ─── MAIN CONTENT ─── */
.main{padding:1.25rem 1rem 3rem}

/* ─── DATE SELECTOR ─── */
.date-bar{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:.7rem 1rem;margin-bottom:1.25rem;
}
.date-nav{
  background:transparent;border:1.5px solid var(--border);color:var(--muted);
  border-radius:8px;width:34px;height:34px;display:flex;align-items:center;
  justify-content:center;cursor:pointer;transition:all .2s;font-size:.85rem;
}
.date-nav:hover{border-color:var(--teal);color:var(--teal)}
.date-label{text-align:center}
.date-label .day-name{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;color:var(--text)}
.date-label .date-str{font-size:.78rem;color:var(--muted);margin-top:.1rem}

/* ─── STATS ROW ─── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem;margin-bottom:1.25rem}
.stat-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:.8rem .7rem;text-align:center;
}
.stat-card .val{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;line-height:1}
.stat-card .lbl{font-size:.7rem;color:var(--muted);margin-top:.25rem;font-weight:500}

/* ─── SCHEDULE ─── */
.schedule-section{margin-bottom:1.75rem}
.section-label{
  font-family:'Syne',sans-serif;font-size:.7rem;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
  margin-bottom:.75rem;
}

.class-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:1rem 1.1rem;margin-bottom:.75rem;
  transition:border-color .2s;
}
.class-card.has-espera{border-left:3px solid var(--purple)}
.class-card.confirmed{border-left:3px solid var(--success)}
.class-card.empty-slot{opacity:.6}

.class-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.class-time{
  font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:800;color:var(--teal);
}
.class-badges{display:flex;gap:.4rem;align-items:center;flex-wrap:wrap}
.cbadge{
  font-size:.68rem;font-weight:600;padding:.22em .6em;border-radius:20px;
  letter-spacing:.02em;
}
.cbadge.cupos{background:rgba(39,249,212,.12);color:var(--teal)}
.cbadge.full{background:rgba(167,139,250,.15);color:var(--purple)}
.cbadge.espera{background:rgba(167,139,250,.15);color:var(--purple)}
.cbadge.ok{background:rgba(16,185,129,.12);color:var(--success)}

/* ─── STUDENT LIST ─── */
.students-list{display:flex;flex-direction:column;gap:.45rem;margin-bottom:.85rem}
.student-row{
  display:flex;align-items:center;justify-content:space-between;gap:.75rem;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
  border-radius:var(--r-sm);padding:.55rem .75rem;
}
.student-info{min-width:0}
.student-name{font-size:.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.student-meta{font-size:.72rem;color:var(--muted);margin-top:.05rem}
.student-status{display:flex;gap:.35rem;align-items:center}

.btn-attend{
  width:30px;height:30px;border-radius:7px;border:1.5px solid;
  display:flex;align-items:center;justify-content:center;font-size:.75rem;
  cursor:pointer;transition:all .2s;background:transparent;
}
.btn-attend.present{border-color:rgba(16,185,129,.4);color:var(--success)}
.btn-attend.present.active,
.btn-attend.present:hover{background:rgba(16,185,129,.15);border-color:var(--success)}
.btn-attend.absent{border-color:rgba(239,68,68,.3);color:var(--danger)}
.btn-attend.absent.active,
.btn-attend.absent:hover{background:rgba(239,68,68,.12);border-color:var(--danger)}
.btn-attend.espera-btn{border-color:rgba(167,139,250,.4);color:var(--purple)}

/* ─── WAITLIST SECTION ─── */
.waitlist-block{
  background:rgba(167,139,250,.06);border:1.5px solid rgba(167,139,250,.25);
  border-radius:var(--r-sm);padding:.7rem .85rem;margin-bottom:.6rem;
}
.waitlist-title{
  font-size:.75rem;font-weight:700;color:var(--purple);
  text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem;
  display:flex;align-items:center;gap:.4rem;
}
.waitlist-user{
  display:flex;align-items:center;justify-content:space-between;
  padding:.35rem 0;border-bottom:1px solid rgba(167,139,250,.12);
}
.waitlist-user:last-child{border-bottom:none}
.waitlist-user .wu-name{font-size:.83rem;font-weight:600}
.waitlist-user .wu-pos{font-size:.7rem;color:var(--purple);margin-top:.05rem}

.btn-notif-wa{
  background:linear-gradient(135deg,#25d366,#128c7e);
  color:#fff;border:none;border-radius:8px;
  padding:.35rem .75rem;font-size:.75rem;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:.35rem;transition:opacity .2s;white-space:nowrap;
}
.btn-notif-wa:hover{opacity:.85}
.btn-notif-wa:disabled{opacity:.45;cursor:not-allowed}

/* ─── ACTION FOOTER OF CARD ─── */
.class-actions{display:flex;gap:.5rem;flex-wrap:wrap}
.btn-class-action{
  flex:1;border-radius:8px;border:none;padding:.55rem .8rem;
  font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:.35rem;
  font-family:'DM Sans',sans-serif;
}
.btn-confirm-all{
  background:linear-gradient(135deg,var(--teal),#1ac4a8);color:#0f1117;
}
.btn-confirm-all:hover{opacity:.85}
.btn-confirm-all:disabled{opacity:.4;cursor:not-allowed}
.btn-promote{
  background:rgba(167,139,250,.15);color:var(--purple);
  border:1.5px solid rgba(167,139,250,.3);
}
.btn-promote:hover{background:rgba(167,139,250,.25)}
.btn-promote:disabled{opacity:.4;cursor:not-allowed}

/* ─── EMPTY ─── */
.empty-day{
  text-align:center;padding:3rem 1rem;color:var(--muted);
}
.empty-day i{font-size:2.5rem;margin-bottom:.75rem;opacity:.3;display:block}
.empty-day p{font-size:.88rem}

/* ─── LOADING ─── */
.spinner-sm{
  width:14px;height:14px;border:2px solid rgba(255,255,255,.2);
  border-top-color:currentColor;border-radius:50%;animation:spin .6s linear infinite;
  display:inline-block;vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── TOAST ─── */
.toast-box{
  position:fixed;bottom:1.25rem;left:50%;transform:translateX(-50%) translateY(80px);
  background:#1e2d3f;border:1.5px solid var(--border);border-radius:12px;
  padding:.65rem 1.15rem;font-size:.85rem;font-weight:600;
  white-space:nowrap;z-index:999;transition:transform .25s ease;pointer-events:none;
  box-shadow:0 8px 24px rgba(0,0,0,.4);
}
.toast-box.show{transform:translateX(-50%) translateY(0)}
.toast-box.success{border-color:var(--success);color:var(--success)}
.toast-box.error{border-color:var(--danger);color:var(--danger)}
.toast-box.info{border-color:var(--teal);color:var(--teal)}
.toast-box.wa{border-color:#25d366;color:#25d366}

/* ─── MODAL WA PREVIEW ─── */
.modal-backdrop-custom{
  position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;
  display:none;align-items:flex-end;justify-content:center;
}
.modal-backdrop-custom.open{display:flex}
.modal-sheet{
  background:var(--surface);border-radius:20px 20px 0 0;
  border-top:1px solid var(--border);width:100%;max-width:520px;
  padding:1.5rem 1.25rem 2rem;animation:slideUp .3s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.modal-handle{
  width:40px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;
  margin:0 auto 1.25rem;
}
.modal-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.05rem;margin-bottom:.25rem}
.modal-sub{font-size:.8rem;color:var(--muted);margin-bottom:1.25rem}
.wa-preview{
  background:#111827;border:1.5px solid rgba(255,255,255,.08);border-radius:10px;
  padding:.9rem 1rem;font-size:.82rem;color:var(--text);line-height:1.6;
  white-space:pre-wrap;margin-bottom:1.25rem;max-height:200px;overflow-y:auto;
}
.modal-btns{display:flex;gap:.6rem}
.btn-modal-cancel{
  flex:1;background:transparent;border:1.5px solid var(--border);
  color:var(--muted);border-radius:10px;padding:.65rem;
  font-size:.88rem;font-weight:600;cursor:pointer;transition:all .2s;
}
.btn-modal-cancel:hover{border-color:var(--danger);color:var(--danger)}
.btn-modal-send{
  flex:2;background:linear-gradient(135deg,#25d366,#128c7e);
  border:none;color:#fff;border-radius:10px;padding:.65rem;
  font-size:.88rem;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:.4rem;transition:opacity .2s;
}
.btn-modal-send:hover{opacity:.85}

/* ─── RESPONSIVE ─── */
@media(min-width:600px){.main{max-width:600px;margin:0 auto}}
</style>
</head>
<body>

<!-- ══════ LOGIN ══════ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">A</div>
      <div>
        <h2>Antología Box23</h2>
        <small>Panel de Entrenadora</small>
      </div>
    </div>
    <div class="login-title">Bienvenida 👋</div>
    <p class="login-sub">Ingresa tus credenciales para continuar</p>

    <div class="mb-3">
      <label class="form-label-custom">Usuario</label>
      <div class="input-wrap">
        <i class="fas fa-mobile-alt input-icon"></i>
        <input type="tel" id="loginUser" class="form-input has-icon"
               placeholder="XXXXXXXXXX" autocomplete="username"
               onkeydown="if(event.key==='Enter') doLogin()">
      </div>
    </div>
    <div class="mb-2">
      <label class="form-label-custom">Contraseña</label>
      <div class="input-wrap">
        <i class="fas fa-id-card input-icon"></i>
        <input type="password" id="loginPass" class="form-input has-icon"
               placeholder="••••••••••" autocomplete="current-password"
               onkeydown="if(event.key==='Enter') doLogin()">
      </div>
    </div>

    <button class="btn-login" id="btnLogin" onclick="doLogin()">
      Iniciar sesión
    </button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ══════ APP ══════ -->
<div id="appScreen">
  <div class="app-header">
    <div class="header-brand">
      <div class="hicon">A</div>
      <div>
        <h1>Programación Diana</h1>
        <small>Panel de entrenadora</small>
      </div>
    </div>
    <div style="display:flex;gap:.5rem;align-items:center">
      <span class="badge-diana">Diana</span>
      <button class="btn-logout" onclick="doLogout()">
        <i class="fas fa-sign-out-alt"></i>
      </button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="view-tabs">
    <button class="vtab active" onclick="switchView('day',this)">
      <i class="fas fa-calendar-day me-1"></i>Hoy
    </button>
    <button class="vtab" onclick="switchView('week',this)">
      <i class="fas fa-calendar-week me-1"></i>Semana
    </button>
  </div>

  <div class="main">
    <!-- Date selector -->
    <div class="date-bar">
      <button class="date-nav" id="btnPrev" onclick="changeDate(-1)">
        <i class="fas fa-chevron-left"></i>
      </button>
      <div class="date-label">
        <div class="day-name" id="lblDayName">Cargando...</div>
        <div class="date-str" id="lblDateStr"></div>
      </div>
      <button class="date-nav" id="btnNext" onclick="changeDate(+1)">
        <i class="fas fa-chevron-right"></i>
      </button>
    </div>

    <!-- Stats -->
    <div class="stats-row" id="statsRow">
      <div class="stat-card">
        <div class="val" id="statTotal" style="color:var(--teal)">—</div>
        <div class="lbl">Clases</div>
      </div>
      <div class="stat-card">
        <div class="val" id="statInscritos" style="color:var(--pink)">—</div>
        <div class="lbl">Inscritos</div>
      </div>
      <div class="stat-card">
        <div class="val" id="statEspera" style="color:var(--purple)">—</div>
        <div class="lbl">En espera</div>
      </div>
    </div>

    <!-- Schedule content -->
    <div id="scheduleContent">
      <div class="empty-day">
        <i class="fas fa-circle-notch fa-spin"></i>
        <p>Cargando programación...</p>
      </div>
    </div>
  </div>
</div>

<!-- ══════ MODAL WA PREVIEW ══════ -->
<div class="modal-backdrop-custom" id="waModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="waModalTitle">Notificar por WhatsApp</div>
    <div class="modal-sub" id="waModalSub"></div>
    <div class="wa-preview" id="waPreviewText"></div>
    <div class="modal-btns">
      <button class="btn-modal-cancel" onclick="closeWaModal()">Cancelar</button>
      <button class="btn-modal-send" id="btnSendWa" onclick="sendWaMessage()">
        <i class="fab fa-whatsapp"></i> Enviar WhatsApp
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-box" id="toast"></div>

<script>
// ══════════════════════════════════════════
//  CONFIG — ajusta según tu setup
// ══════════════════════════════════════════
const SCRIPT_URL  = 'https://script.google.com/macros/s/AKfycbx2tVsZ_jPFpAUlFrTdsLszJjI_ibkT8U7j-tXQ-rOFLm_cwIPoNnIG83ZMEm48Lsp3/exec';
const CLASS_TYPE  = 'semipersonalizado_diana';
const MAX_CUPOS   = 4;
const GYM_NAME    = 'Antología Box23';

// Credenciales de Diana (celular = usuario, documento = contraseña)
const DIANA_CREDENTIALS = [
  // { user: '3028514211', pass: '1057588479', name: 'Diana' }
  // Ejemplo: { user: '3001234567', pass: '12345678', name: 'Diana' }
  // PUEDES AGREGAR MÁS ENTRENADORAS AQUÍ
  { user: '3028514211', pass: '1057588479', name: 'Diana' },  // ← Cambia por los datos reales
  { user: '3208009736', pass: '74189928', name: 'Carlos' }  // ← Cambia por los datos reales
];

// ══════════════════════════════════════════
//  ESTADO
// ══════════════════════════════════════════
let state = {
  trainer: null,
  bookings: [],
  currentDate: todayStr(),
  view: 'day',
  waPayload: null
};

let toastTimer;

// ══════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════
function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

function parseLocalDate(str) {
  if (!str) return null;
  const [y,m,d] = str.split('-').map(Number);
  return new Date(y, m-1, d);
}

function formatDateFull(str) {
  const d = parseLocalDate(str);
  if (!d) return str;
  const days = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return days[d.getDay()] + ' ' + d.getDate() + ' de ' + months[d.getMonth()];
}

function formatDateShort(str) {
  const d = parseLocalDate(str);
  if (!d) return str;
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return d.getDate() + ' ' + months[d.getMonth()];
}

function getDayName(str) {
  const d = parseLocalDate(str);
  if (!d) return '';
  return ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'][d.getDay()];
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function addDays(str, n) {
  const d = parseLocalDate(str);
  d.setDate(d.getDate() + n);
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

function getWeekRange(str) {
  const d = parseLocalDate(str);
  const day = d.getDay(); // 0=dom
  const mon = new Date(d); mon.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  const sat = new Date(mon); sat.setDate(mon.getDate() + 5);
  const toStr = x => x.getFullYear() + '-' + String(x.getMonth()+1).padStart(2,'0') + '-' + String(x.getDate()).padStart(2,'0');
  const days = [];
  for (let i = 0; i < 6; i++) {
    const dd = new Date(mon); dd.setDate(mon.getDate() + i);
    days.push(toStr(dd));
  }
  return days;
}

function showToast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast-box show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

const SESSION_KEY = 'diana_trainer_session';

// ══════════════════════════════════════════
//  API
// ══════════════════════════════════════════
async function gasCall(action, payload = {}) {
  const data = encodeURIComponent(JSON.stringify(payload));
  const url  = `${SCRIPT_URL}?action=${action}&payload=${data}`;
  const res  = await fetch(url, { redirect: 'follow' });
  const text = await res.text();
  console.log(`[gasCall] ${action} → ${text.substring(0, 200)}`);
  // Intentar parsear directamente
  try { return JSON.parse(text); } catch(_) {}
  // Fallback: extraer primer objeto JSON del texto
  const m = text.match(/\{[\s\S]*\}/);
  if (!m) throw new Error('Respuesta inválida del servidor: ' + text.substring(0, 100));
  try { return JSON.parse(m[0]); } catch(e) {
    throw new Error('JSON inválido: ' + e.message);
  }
}

function extractRows(json) {
  if (!json) return [];
  if (Array.isArray(json)) return json;
  if (Array.isArray(json.data)) return json.data;
  if (json.data && Array.isArray(json.data.classes)) return json.data.classes;
  if (Array.isArray(json.classes)) return json.classes;
  if (json.data && typeof json.data === 'object') {
    const arr = Object.values(json.data).find(v => Array.isArray(v));
    if (arr) return arr;
  }
  return [];
}

async function loadBookings() {
  renderLoading();
  try {
    const json = await gasCall('getProgramacionDiana');
    console.log('[loadBookings] raw response:', JSON.stringify(json).substring(0, 400));
    const rows = extractRows(json);
    console.log('[loadBookings] rows extracted:', rows.length, rows[0] || 'none');

    // Normalizar: la hoja usa 'classDate' como fecha; copiar a 'date' para
    // que el resto del código funcione sin cambios adicionales.
    rows.forEach(b => {
      // ── Fecha ──
      if (!b.date && b.classDate) b.date = String(b.classDate).substring(0, 10);
      if (b.date) b.date = String(b.date).substring(0, 10);

      // ── Hora ──
      // Puede llegar como 'HH:MM' (correcto), timestamp ms negativo (Date de Sheets),
      // o número fraccionario (fracción de día de Sheets)
      let t = b.time || b.classTime || '';
      if (t && /^-?\d{6,}$/.test(String(t).trim())) {
        // Timestamp en ms (ej: -2209079024000) = Date de Sheets para hora pura
        // getHours() usa hora local del navegador (Colombia UTC-5) = correcto
        const d = new Date(Number(t));
        t = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
      } else if (t && /^0\.\d+$/.test(String(t).trim())) {
        // Fracción de día (0.25 = 06:00)
        const mins = Math.round(Number(t) * 24 * 60);
        t = String(Math.floor(mins/60)).padStart(2,'0') + ':' + String(mins%60).padStart(2,'0');
      }
      b.time = String(t).trim();
    });

    state.bookings = rows.filter(b => b.status !== 'cancelada');
    console.log('[loadBookings] bookings loaded:', state.bookings.length);
  } catch (e) {
    console.error('loadBookings:', e);
    state.bookings = [];
    showToast('Error al cargar la programación', 'error');
  }
  renderSchedule();
}

// ══════════════════════════════════════════
//  CONFIRM / MARK ATTENDANCE
// ══════════════════════════════════════════
async function setAttendanceStatus(bookingId, userId, userName, dateStr, timeStr, newStatus) {
  const btn = document.querySelector(`#sr-${bookingId || userId} .btn-attend.${newStatus === 'cumplida' ? 'present' : 'absent'}`);
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner-sm"></span>'; }
  try {
    const payload = { bookingId, userId, date: dateStr, time: timeStr, status: newStatus, confirmedBy: 'diana' };
    const res = await gasCall('updateBookingStatus', payload);
    if (res && res.error) throw new Error(res.error);
    // Actualizar estado local
    const b = state.bookings.find(x =>
      (bookingId && x.id === bookingId) ||
      (x.userId === userId && (x.date||'').substring(0,10) === dateStr && (x.time||x.classTime||'').trim() === timeStr)
    );
    if (b) b.status = newStatus;
    const icon = newStatus === 'cumplida' ? '✓' : '✕';
    const label = newStatus === 'cumplida' ? 'Asistencia confirmada' : 'Marcada como no cumplida';
    showToast(`${icon} ${label}: ${userName}`, newStatus === 'cumplida' ? 'success' : 'info');
    renderSchedule();
  } catch (e) {
    console.error('setAttendanceStatus:', e);
    showToast('Error al registrar asistencia: ' + (e.message || e), 'error');
    renderSchedule(); // restaurar UI
  }
}

async function confirmAttendance(bookingId, userId, userName, dateStr, timeStr) {
  await setAttendanceStatus(bookingId, userId, userName, dateStr, timeStr, 'cumplida');
}

async function markAbsent(bookingId, userId, userName, dateStr, timeStr) {
  await setAttendanceStatus(bookingId, userId, userName, dateStr, timeStr, 'no cumplida');
}

async function confirmAllAttendance(dateStr, timeStr) {
  const slot = getSlotBookings(dateStr, timeStr).filter(b => b.status === 'programada');
  if (slot.length === 0) { showToast('No hay inscritos programados en este horario', 'info'); return; }
  try {
    for (const b of slot) {
      const payload = { bookingId: b.id, userId: b.userId, date: dateStr, time: timeStr, status: 'cumplida', confirmedBy: 'diana' };
      const res = await gasCall('updateBookingStatus', payload);
      if (res && !res.error) b.status = 'cumplida';
    }
    showToast(`✓ ${slot.length} asistencias confirmadas`, 'success');
    renderSchedule();
  } catch (e) {
    console.error('confirmAll:', e);
    showToast('Error al confirmar asistencias', 'error');
  }
}

// ══════════════════════════════════════════
function openWaNotification(waitUser, dateStr, timeStr) {
  const dayFull = formatDateFull(dateStr);
  const nombre  = (waitUser.userName || waitUser.name || 'Estudiante').split(' ')[0];
  const phone   = waitUser.userPhone || waitUser.phone || '';

  const msg = `¡Hola ${nombre}! 🎉\n\nTe escribimos desde ${GYM_NAME} para informarte que *quedó disponible un cupo* en la clase:\n\n📅 ${dayFull}\n⏰ ${timeStr}\n\nTu lugar queda *confirmado automáticamente*. ¡Te esperamos! 💪\n\nSi tienes alguna duda escríbenos. ¡Hasta pronto!`;

  state.waPayload = { phone, msg, waitUser, dateStr, timeStr };

  document.getElementById('waModalTitle').textContent = 'Notificar cupo disponible';
  document.getElementById('waModalSub').textContent   = `Para: ${waitUser.userName || waitUser.name || 'Estudiante'} · ${phone || 'sin teléfono'}`;
  document.getElementById('waPreviewText').textContent = msg;
  document.getElementById('waModal').classList.add('open');
}

function closeWaModal() {
  document.getElementById('waModal').classList.remove('open');
  state.waPayload = null;
}

function sendWaMessage() {
  if (!state.waPayload) return;
  const { phone, msg, waitUser, dateStr, timeStr } = state.waPayload;

  if (!phone) {
    showToast('Este usuario no tiene teléfono registrado', 'error');
    closeWaModal();
    return;
  }

  const clean   = phone.replace(/\D/g,'');
  const encoded = encodeURIComponent(msg);
  const url     = `https://wa.me/57${clean}?text=${encoded}`;
  window.open(url, '_blank');

  // Actualizar status a 'programada' en Google Sheets
  try {
    gasCall('updateBookingStatus', {
      bookingId: waitUser.id,
      userId: waitUser.userId,
      date: dateStr,
      time: timeStr,
      status: 'programada',
      confirmedBy: 'diana'
    }).then(() => {
      if (waitUser) waitUser.status = 'programada';
      renderSchedule();
    });
  } catch(e) {}

  showToast('WhatsApp abierto ✓', 'wa');
  closeWaModal();
}

function renderLoading() {
  document.getElementById('scheduleContent').innerHTML = `
    <div class="empty-day">
      <i class="fas fa-circle-notch fa-spin" style="font-size:2rem;opacity:.4;display:block;margin-bottom:.75rem"></i>
      <p>Cargando programación...</p>
    </div>`;
}

function getSlotBookings(dateStr, timeStr) {
  return state.bookings.filter(b => {
    const bDate = (b.date || '').substring(0,10);
    const bTime = (b.time || b.classTime || '').trim();
    return bDate === dateStr && bTime === timeStr;
  });
}

function renderSchedule() {
  if (state.view === 'day') {
    updateDateBar();
    renderDayView(state.currentDate);
  } else {
    renderWeekView();
  }
}

function getTimesForDate(dateStr) {
  // Primero intentar derivar horarios reales de las reservas cargadas
  const realTimes = [...new Set(
    state.bookings
      .filter(b => (b.date || '').substring(0, 10) === dateStr)
      .map(b => (b.time || '').trim())
      .filter(Boolean)
  )].sort();

  if (realTimes.length > 0) return realTimes;

  // Fallback: horarios por defecto según día de la semana
  const d = parseLocalDate(dateStr);
  const dow = d.getDay(); // 0=dom, 6=sab
  if (dow === 0) return [];
  if (dow === 6) return ['08:00','09:00','10:00'];
  return ['06:00','07:00','08:00','09:00','17:00','18:00','19:00'];
}

function renderDayView(dateStr) {
  const times = getTimesForDate(dateStr);

  // Stats
  let totalClases = 0, totalInscritos = 0, totalEspera = 0;
  times.forEach(t => {
    const all = getSlotBookings(dateStr, t);
    const active = all.filter(b => b.status !== 'cancelada');
    if (active.length > 0) totalClases++;
    totalInscritos += active.filter(b => b.status !== 'espera').length;
    totalEspera    += active.filter(b => b.status === 'espera').length;
  });
  document.getElementById('statTotal').textContent    = totalClases;
  document.getElementById('statInscritos').textContent = totalInscritos;
  document.getElementById('statEspera').textContent    = totalEspera;

  if (times.length === 0) {
    document.getElementById('scheduleContent').innerHTML = `
      <div class="empty-day">
        <i class="fas fa-moon"></i>
        <p>No hay clases los domingos</p>
      </div>`;
    return;
  }

  const sections = times.map(t => renderSlotCard(dateStr, t)).join('');
  document.getElementById('scheduleContent').innerHTML = `
    <div class="schedule-section">
      <div class="section-label"><i class="fas fa-clock me-1"></i>Horarios del día</div>
      ${sections}
    </div>`;
}

function renderSlotCard(dateStr, timeStr) {
  const all       = getSlotBookings(dateStr, timeStr);
  const inscritos = all.filter(b => b.status !== 'espera' && b.status !== 'cancelada');
  const waitlist  = all.filter(b => b.status === 'espera');
  const confirmed = inscritos.filter(b => b.status === 'cumplida').length;
  const pending   = inscritos.filter(b => b.status === 'programada').length;
  const isFull    = inscritos.length >= MAX_CUPOS;
  const hasEspera = waitlist.length > 0;

  let cardClass = '';
  if (hasEspera) cardClass = 'has-espera';
  if (confirmed === inscritos.length && inscritos.length > 0) cardClass = 'confirmed';
  if (inscritos.length === 0 && waitlist.length === 0) cardClass = 'empty-slot';

  // Badges
  const badges = [];
  if (inscritos.length > 0)
    badges.push(`<span class="cbadge ${isFull ? 'full' : 'cupos'}">${inscritos.length}/${MAX_CUPOS}</span>`);
  else
    badges.push(`<span class="cbadge cupos">0/${MAX_CUPOS}</span>`);
  if (hasEspera)
    badges.push(`<span class="cbadge espera"><i class="fas fa-hourglass-half me-1"></i>${waitlist.length} en espera</span>`);
  if (confirmed > 0 && confirmed === inscritos.length && inscritos.length > 0)
    badges.push(`<span class="cbadge ok"><i class="fas fa-check me-1"></i>Confirmada</span>`);

  // Students rows
  let studentsHtml = '';
  if (inscritos.length > 0) {
    studentsHtml = `<div class="students-list">` +
      inscritos.map(b => {
        const name    = escHtml(b.userName || b.name || 'Sin nombre');
        const doc     = b.userDoc || b.document || '';
        const status  = b.status || 'programada';
        const isPres  = status === 'cumplida';
        const isAbs   = status === 'no cumplida';
        let statusBadge = '';
        if (isPres) statusBadge = `<span style="font-size:.68rem;color:var(--success);font-weight:600;margin-left:.4rem"><i class="fas fa-check-circle me-1"></i>Cumplida</span>`;
        else if (isAbs) statusBadge = `<span style="font-size:.68rem;color:var(--danger);font-weight:600;margin-left:.4rem"><i class="fas fa-times-circle me-1"></i>No cumplida</span>`;
        const bid = (b.id||'').replace(/'/g,"\'");
        const buid = (b.userId||'').replace(/'/g,"\'");
        const safeName = name.replace(/'/g,"\'");
        return `<div class="student-row" id="sr-${b.id || b.userId}">
          <div class="student-info">
            <div class="student-name">${name}</div>
            <div class="student-meta">
              <i class="fas fa-id-card me-1" style="opacity:.5"></i>${escHtml(doc)}${statusBadge}
            </div>
          </div>
          <div class="student-status">
            <button class="btn-attend present ${isPres ? 'active' : ''}"
                    title="Asistio (cumplida)"
                    ${isPres ? 'disabled' : ''}
                    onclick="confirmAttendance('${bid}','${buid}','${safeName}','${dateStr}','${timeStr}')">
              <i class="fas fa-check"></i>
            </button>
            <button class="btn-attend absent ${isAbs ? 'active' : ''}"
                    title="No asistio (no cumplida)"
                    ${isAbs ? 'disabled' : ''}
                    onclick="markAbsent('${bid}','${buid}','${safeName}','${dateStr}','${timeStr}')">
              <i class="fas fa-times"></i>
            </button>
          </div>
        </div>`;
      }).join('') +
      `</div>`;
  } else if (!hasEspera) {
    studentsHtml = `<p style="font-size:.82rem;color:var(--muted);margin-bottom:.75rem;font-style:italic">No hay inscritos en este horario</p>`;
  }

  // Waitlist block
  let waitHtml = '';
  if (hasEspera) {
    waitHtml = `<div class="waitlist-block">
      <div class="waitlist-title"><i class="fas fa-hourglass-half"></i>Lista de espera</div>` +
      waitlist.map((w, i) => {
        return `<div class="waitlist-user">
          <div>
            <div class="wu-name">${escHtml(w.userName || w.name || 'Sin nombre')}</div>
            <div class="wu-pos">Posición ${i+1} · ${escHtml(w.userPhone || w.phone || 'sin tel.')}</div>
          </div>
          <button class="btn-notif-wa" onclick='openWaNotification(${JSON.stringify(w)},"${dateStr}","${timeStr}")'>
            <i class="fab fa-whatsapp"></i> Notificar
          </button>
        </div>`;
      }).join('') +
      `</div>`;
  }

  // Actions
  const hasActions = pending > 0;
  const actionsHtml = `<div class="class-actions">
    <button class="btn-class-action btn-confirm-all" ${!hasActions ? 'disabled' : ''}
            onclick="confirmAllAttendance('${dateStr}','${timeStr}')">
      <i class="fas fa-check-double"></i> Confirmar todos
    </button>
  </div>`;

  return `<div class="class-card ${cardClass}">
    <div class="class-header">
      <div class="class-time">${escHtml(timeStr)}</div>
      <div class="class-badges">${badges.join('')}</div>
    </div>
    ${studentsHtml}
    ${waitHtml}
    ${inscritos.length > 0 ? actionsHtml : ''}
  </div>`;
}

function renderWeekView() {
  const days = getWeekRange(state.currentDate);
  document.getElementById('lblDayName').textContent = 'Esta semana';
  document.getElementById('lblDateStr').textContent =
    formatDateShort(days[0]) + ' – ' + formatDateShort(days[5]);

  let totalClases = 0, totalInscritos = 0, totalEspera = 0;
  let html = '';

  days.forEach(dateStr => {
    const times = getTimesForDate(dateStr);
    if (times.length === 0) return;

    const dayBookings = state.bookings.filter(b => (b.date||'').substring(0,10) === dateStr);
    if (dayBookings.length === 0) return;

    const inscs  = dayBookings.filter(b => b.status !== 'espera' && b.status !== 'cancelada');
    const waits  = dayBookings.filter(b => b.status === 'espera');
    const slots  = new Set(inscs.map(b => b.time || b.classTime)).size;

    totalClases    += slots;
    totalInscritos += inscs.length;
    totalEspera    += waits.length;

    const slotCards = times
      .filter(t => getSlotBookings(dateStr,t).length > 0)
      .map(t => renderSlotCard(dateStr, t))
      .join('');

    if (slotCards) {
      html += `<div class="schedule-section">
        <div class="section-label">
          <i class="fas fa-calendar-day me-1"></i>${getDayName(dateStr)} · ${formatDateShort(dateStr)}
        </div>
        ${slotCards}
      </div>`;
    }
  });

  document.getElementById('statTotal').textContent     = totalClases;
  document.getElementById('statInscritos').textContent  = totalInscritos;
  document.getElementById('statEspera').textContent     = totalEspera;

  if (!html) {
    html = `<div class="empty-day"><i class="fas fa-calendar-times"></i><p>No hay clases programadas esta semana</p></div>`;
  }

  document.getElementById('scheduleContent').innerHTML = html;
}

  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appScreen').style.display   = 'none';
    setTimeout(() => document.getElementById('loginUser').focus(), 200);
  }

  // Cerrar modal WA al hacer click fuera
  document.getElementById('waModal').addEventListener('click', e => {
    if (e.target === document.getElementById('waModal')) closeWaModal();
  });
});
</script>
</body>
</html>
