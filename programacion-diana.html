<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programar Clase — Semipersonalizados Diana</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #27F9D4;
            --color-secondary: #FF729F;
            --color-accent: #F0F66E;
            --color-bg: #1a2332;
            --color-card: #273043;
            --color-border: #324466;
            --color-text: #f8f9fa;
            --color-muted: #8899aa;
            --color-success: #10b981;
            --color-danger: #ef4444;
            --color-warning: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--color-bg);
            color: var(--color-text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        /* ── HEADER ── */
        .page-header {
            background: linear-gradient(135deg, #1a2332 0%, #273043 100%);
            border-bottom: 2px solid var(--color-primary);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .page-header .logo { height: 40px; width: auto; filter: drop-shadow(0 0 6px rgba(39,249,212,.5)); }
        .page-header .title-block h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--color-primary);
            line-height: 1.1;
        }
        .page-header .title-block span {
            font-size: 0.8rem;
            color: var(--color-muted);
        }
        .badge-diana {
            background: linear-gradient(135deg, var(--color-primary), #1de5c0);
            color: #1a2332;
            font-weight: 700;
            font-size: 0.75rem;
            padding: 0.35em 0.75em;
            border-radius: 20px;
            margin-left: auto;
            white-space: nowrap;
        }

        /* ── MAIN CONTENT ── */
        .main-wrap {
            max-width: 520px;
            margin: 0 auto;
            padding: 2rem 1rem 3rem;
        }

        /* ── STEPS ── */
        .step { display: none; }
        .step.active { display: block; animation: fadeIn .3s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

        /* ── CARD ── */
        .sched-card {
            background: var(--color-card);
            border: 1px solid var(--color-border);
            border-radius: 16px;
            padding: 1.75rem;
            margin-bottom: 1.5rem;
        }
        .sched-card h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--color-primary);
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        /* ── FORM CONTROLS ── */
        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--color-muted);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: .04em;
        }
        .form-control, .form-select {
            background: #1a2332;
            border: 1.5px solid var(--color-border);
            color: var(--color-text);
            border-radius: 10px;
            padding: .6rem .9rem;
            font-size: .95rem;
            transition: border-color .2s, box-shadow .2s;
        }
        .form-control:focus, .form-select:focus {
            background: #1a2332;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(39,249,212,.15);
            color: var(--color-text);
        }
        .form-control::placeholder { color: #556677; }
        .form-select option { background: #1a2332; }

        /* ── SLOT GRID ── */
        .slots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: .6rem;
            margin-top: .5rem;
        }
        .slot-btn {
            background: #1a2332;
            border: 2px solid var(--color-border);
            border-radius: 10px;
            padding: .65rem .5rem;
            text-align: center;
            cursor: pointer;
            transition: all .2s;
            color: var(--color-text);
            font-size: .85rem;
            line-height: 1.3;
        }
        .slot-btn:hover:not(.full):not(.selected) {
            border-color: var(--color-primary);
            background: rgba(39,249,212,.08);
        }
        .slot-btn.selected {
            border-color: var(--color-primary);
            background: rgba(39,249,212,.18);
            color: var(--color-primary);
            font-weight: 600;
        }
        .slot-btn.full {
            opacity: .45;
            cursor: not-allowed;
            border-style: dashed;
        }
        .slot-btn .slot-time { font-weight: 700; font-size: .9rem; }
        .slot-btn .slot-avail { font-size: .72rem; color: var(--color-muted); margin-top: .15rem; }
        .slot-btn.selected .slot-avail { color: var(--color-primary); }

        /* ── DAY TABS ── */
        .day-tabs {
            display: flex;
            gap: .4rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .day-tab {
            background: #1a2332;
            border: 2px solid var(--color-border);
            border-radius: 8px;
            padding: .35rem .75rem;
            font-size: .82rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--color-muted);
            transition: all .2s;
        }
        .day-tab.active {
            background: rgba(39,249,212,.15);
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        /* ── USER INFO CARD ── */
        .user-found {
            background: rgba(16,185,129,.1);
            border: 1.5px solid var(--color-success);
            border-radius: 10px;
            padding: .85rem 1rem;
            display: flex;
            align-items: center;
            gap: .75rem;
            margin-top: 1rem;
        }
        .user-found .user-avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: #1a2332; font-size: 1rem;
            flex-shrink: 0;
        }
        .user-found .user-name { font-weight: 700; font-size: .95rem; }
        .user-found .user-detail { font-size: .78rem; color: var(--color-muted); }

        /* ── ERROR / ALERT ── */
        .alert-err {
            background: rgba(239,68,68,.12);
            border: 1.5px solid var(--color-danger);
            border-radius: 10px;
            padding: .7rem 1rem;
            font-size: .88rem;
            color: #fca5a5;
            display: none;
            margin-top: .75rem;
        }
        .alert-err.show { display: block; }

        /* ── BUTTONS ── */
        .btn-primary-custom {
            background: linear-gradient(135deg, var(--color-primary), #1de5c0);
            color: #1a2332;
            border: none;
            border-radius: 10px;
            padding: .75rem 1.5rem;
            font-weight: 700;
            font-size: 1rem;
            width: 100%;
            cursor: pointer;
            transition: opacity .2s, transform .1s;
        }
        .btn-primary-custom:hover { opacity: .9; transform: translateY(-1px); }
        .btn-primary-custom:disabled { opacity: .45; cursor: not-allowed; transform: none; }
        .btn-secondary-custom {
            background: transparent;
            border: 2px solid var(--color-border);
            color: var(--color-muted);
            border-radius: 10px;
            padding: .7rem 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
        }
        .btn-secondary-custom:hover { border-color: var(--color-primary); color: var(--color-primary); }

        /* ── SUMMARY ── */
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: .5rem 0;
            border-bottom: 1px solid var(--color-border);
            font-size: .9rem;
        }
        .summary-row:last-child { border-bottom: none; }
        .summary-row .label { color: var(--color-muted); }
        .summary-row .value { font-weight: 600; }

        /* ── SUCCESS ── */
        .success-icon {
            width: 72px; height: 72px;
            border-radius: 50%;
            background: rgba(16,185,129,.15);
            border: 3px solid var(--color-success);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2rem;
            color: var(--color-success);
        }

        /* ── LOADING ── */
        .spinner-sm {
            width: 18px; height: 18px;
            border: 2.5px solid rgba(26,35,50,.4);
            border-top-color: #1a2332;
            border-radius: 50%;
            animation: spin .6s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: .4rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── PROGRESS ── */
        .progress-bar-wrap {
            display: flex;
            gap: .4rem;
            margin-bottom: 1.5rem;
        }
        .progress-seg {
            flex: 1;
            height: 4px;
            border-radius: 2px;
            background: var(--color-border);
            transition: background .3s;
        }
        .progress-seg.done { background: var(--color-primary); }

        /* ── CAPTION ── */
        .caption { font-size: .78rem; color: var(--color-muted); margin-top: .4rem; }
    </style>
</head>
<body>

<!-- HEADER -->
<header class="page-header">
    <img src="images/logo.png" class="logo" alt="Antología" onerror="this.style.display='none'">
    <div class="title-block">
        <h1><i class="fas fa-dumbbell me-1"></i>Semipersonalizados</h1>
        <span>Programación de clases — Diana</span>
    </div>
    <div class="badge-diana"><i class="fas fa-star me-1"></i>Diana</div>
</header>

<!-- MAIN -->
<div class="main-wrap">

    <!-- PROGRESS -->
    <div class="progress-bar-wrap" id="progressBar">
        <div class="progress-seg done" id="seg1"></div>
        <div class="progress-seg" id="seg2"></div>
        <div class="progress-seg" id="seg3"></div>
    </div>

    <!-- ═══ STEP 1: IDENTIFICACIÓN ═══ -->
    <div class="step active" id="step1">
        <div class="sched-card">
            <h2><i class="fas fa-id-card"></i>Identificación</h2>
            <p class="caption mb-3">Ingresa tu número de documento y contraseña para continuar.</p>

            <div class="mb-3">
                <label class="form-label">Número de documento</label>
                <input type="text" class="form-control" id="loginDoc"
                       placeholder="Ej. 1234567890" inputmode="numeric" autocomplete="off">
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña </label>
                <input type="password" class="form-control" id="loginPass"
                       placeholder="**********" inputmode="numeric" autocomplete="off">
            </div>

            <div class="alert-err" id="loginError"></div>

            <div id="userFoundCard" style="display:none;"></div>

            <div class="mt-3">
                <button class="btn-primary-custom" id="btnIdentify" onclick="handleIdentify()">
                    Continuar <i class="fas fa-arrow-right ms-1"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- ═══ STEP 2: SELECCIÓN DE CLASE ═══ -->
    <div class="step" id="step2">
        <div class="sched-card">
            <h2><i class="fas fa-calendar-alt"></i>Selecciona tu clase</h2>

            <!-- Día de la semana -->
            <label class="form-label">Día</label>
            <div class="day-tabs" id="dayTabs"></div>

            <!-- Slots de horario -->
            <label class="form-label">Horario disponible</label>
            <div class="slots-grid" id="slotsGrid"></div>
            <div class="alert-err" id="slotError"></div>
        </div>

        <div style="display:flex;gap:.75rem;">
            <button class="btn-secondary-custom" style="flex:0 0 auto;" onclick="goStep(1)">
                <i class="fas fa-arrow-left me-1"></i>Volver
            </button>
            <button class="btn-primary-custom" id="btnConfirmSlot" onclick="goStep(3)" disabled>
                Ver resumen <i class="fas fa-arrow-right ms-1"></i>
            </button>
        </div>
    </div>

    <!-- ═══ STEP 3: CONFIRMAR ═══ -->
    <div class="step" id="step3">
        <div class="sched-card">
            <h2><i class="fas fa-check-circle"></i>Confirmar reserva</h2>
            <div id="summaryContent"></div>
            <div class="alert-err" id="confirmError"></div>
        </div>
        <div style="display:flex;gap:.75rem;">
            <button class="btn-secondary-custom" style="flex:0 0 auto;" onclick="goStep(2)">
                <i class="fas fa-arrow-left me-1"></i>Cambiar
            </button>
            <button class="btn-primary-custom" id="btnBook" onclick="bookClass()">
                <span id="btnBookText">Confirmar reserva</span>
            </button>
        </div>
    </div>

    <!-- ═══ STEP 4: ÉXITO ═══ -->
    <div class="step" id="step4">
        <div class="sched-card" style="text-align:center; padding:2.5rem 1.75rem;">
            <div class="success-icon"><i class="fas fa-check"></i></div>
            <h2 style="justify-content:center; color: var(--color-success);">¡Reserva confirmada!</h2>
            <p style="color:var(--color-muted); font-size:.95rem; margin-bottom:1.5rem;" id="successMsg"></p>
            <button class="btn-primary-custom" onclick="resetFlow()">
                <i class="fas fa-plus me-2"></i>Nueva reserva
            </button>
        </div>
    </div>

</div><!-- /main-wrap -->

<script>
// ══════════════════════════════════════════
//  CONFIGURACIÓN DE HORARIOS — DIANA
// ══════════════════════════════════════════
const SCHEDULE_CONFIG = {
    lunes:    ['06:00', '07:00', '08:00', '09:00', '17:00', '18:00', '19:00'],
    martes:   ['06:00', '07:00', '08:00', '09:00', '17:00', '18:00', '19:00'],
    miércoles:['06:00', '07:00', '08:00', '09:00', '17:00', '18:00', '19:00'],
    jueves:   ['06:00', '07:00', '08:00', '09:00', '17:00', '18:00', '19:00'],
    viernes:  ['06:00', '07:00', '08:00', '09:00', '17:00', '18:00', '19:00'],
    sábado:   ['08:00', '09:00', '10:00'],
};
const MAX_PER_SLOT = 4; // máximo alumnos por horario
const CLASS_TYPE   = 'semipersonalizado_diana';
const SCRIPT_URL   = 'https://script.google.com/macros/s/AKfycbz9YubFTKIAFUXsQYoOh691HUytL7QwYZ9ZQL-WG0k2nab0w-_FzCCcX6Lm0SMC0TZA/exec';

// ══════════════════════════════════════════
//  ESTADO
// ══════════════════════════════════════════
let state = {
    currentStep: 1,
    user: null,
    selectedDay: null,
    selectedTime: null,
    bookings: []  // reservas ya existentes cargadas del backend
};

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
    buildDayTabs();
    loadBookings();
    document.getElementById('loginDoc').addEventListener('keydown', e => { if (e.key === 'Enter') handleIdentify(); });
    document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') handleIdentify(); });
});

async function loadBookings() {
    try {
        const data  = encodeURIComponent(btoa(unescape(encodeURIComponent(JSON.stringify({ classType: CLASS_TYPE })))));
        const url   = `${SCRIPT_URL}?action=getClasses&payload=${data}`;
        const res   = await fetch(url, { redirect: 'follow' });
        const text  = await res.text();
        const match = text.match(/\{[\s\S]*\}/);
        if (match) {
            const json = JSON.parse(match[0]);
            state.bookings = (json.data || json.classes || []).filter(b => b.classType === CLASS_TYPE);
        }
    } catch(e) {
        state.bookings = [];
    }
    refreshSlots();
}

// ══════════════════════════════════════════
//  IDENTIFICACIÓN
// ══════════════════════════════════════════
async function handleIdentify() {
    const doc  = (document.getElementById('loginDoc').value  || '').replace(/\D/g, '');
    const pass = (document.getElementById('loginPass').value || '').replace(/\D/g, '');
    const errEl = document.getElementById('loginError');
    errEl.classList.remove('show');

    if (!doc || !pass) { showErr(errEl, 'Completa todos los campos.'); return; }

    const btn = document.getElementById('btnIdentify');
    btn.innerHTML = '<span class="spinner-sm"></span>Verificando...';
    btn.disabled = true;

    try {
        const data  = encodeURIComponent(btoa(unescape(encodeURIComponent(JSON.stringify({})))));
        const url   = `${SCRIPT_URL}?action=getUsers&payload=${data}`;
        const res   = await fetch(url, { redirect: 'follow' });
        const text  = await res.text();
        const match = text.match(/\{[\s\S]*\}/);
        let users   = [];
        if (match) {
            const json = JSON.parse(match[0]);
            users = json.data || json.users || [];
        }
        const found = users.find(u =>
            (u.document || '').replace(/\D/g,'') === doc &&
            (u.phone    || '').replace(/\D/g,'') === pass &&
            u.status === 'active'
        );
        if (!found) {
            showErr(errEl, 'Documento o contraseña incorrectos, o usuario inactivo.');
            btn.innerHTML = 'Continuar <i class="fas fa-arrow-right ms-1"></i>';
            btn.disabled = false;
            return;
        }
        state.user = found;
        showUserCard(found);
        setTimeout(() => goStep(2), 700);
    } catch(e) {
        showErr(errEl, 'Error de conexión. Intenta de nuevo.');
        btn.innerHTML = 'Continuar <i class="fas fa-arrow-right ms-1"></i>';
        btn.disabled = false;
    }
}

function showUserCard(u) {
    const initial = (u.name || '?').charAt(0).toUpperCase();
    document.getElementById('userFoundCard').style.display = 'flex';
    document.getElementById('userFoundCard').className = 'user-found';
    document.getElementById('userFoundCard').innerHTML = `
        <div class="user-avatar">${initial}</div>
        <div>
            <div class="user-name">${u.name}</div>
            <div class="user-detail"><i class="fas fa-id-card me-1"></i>${u.document} · ${u.affiliationType || 'Sin plan'}</div>
        </div>
        <i class="fas fa-check-circle ms-auto" style="color:var(--color-success);font-size:1.3rem;"></i>
    `;
}

// ══════════════════════════════════════════
//  DAY TABS
// ══════════════════════════════════════════
function buildDayTabs() {
    const days = Object.keys(SCHEDULE_CONFIG);
    const cont = document.getElementById('dayTabs');
    days.forEach((d, i) => {
        const btn = document.createElement('button');
        btn.className = 'day-tab' + (i === 0 ? ' active' : '');
        btn.textContent = d.charAt(0).toUpperCase() + d.slice(1);
        btn.onclick = () => selectDay(d);
        cont.appendChild(btn);
    });
    state.selectedDay = days[0];
    refreshSlots();
}

function selectDay(day) {
    state.selectedDay  = day;
    state.selectedTime = null;
    document.querySelectorAll('.day-tab').forEach(b => {
        b.classList.toggle('active', b.textContent.toLowerCase() === day.toLowerCase());
    });
    document.getElementById('btnConfirmSlot').disabled = true;
    refreshSlots();
}

// ══════════════════════════════════════════
//  SLOTS
// ══════════════════════════════════════════
function countBookings(day, time) {
    return state.bookings.filter(b => b.day === day && b.time === time).length;
}

function refreshSlots() {
    const grid = document.getElementById('slotsGrid');
    if (!grid) return;
    grid.innerHTML = '';
    const times = SCHEDULE_CONFIG[state.selectedDay] || [];
    if (!times.length) { grid.innerHTML = '<p class="caption">Sin horarios este día.</p>'; return; }

    times.forEach(t => {
        const taken  = countBookings(state.selectedDay, t);
        const avail  = MAX_PER_SLOT - taken;
        const isFull = avail <= 0;
        const isSel  = (state.selectedTime === t);

        const btn = document.createElement('div');
        btn.className = 'slot-btn' + (isFull ? ' full' : '') + (isSel ? ' selected' : '');
        btn.innerHTML = `
            <div class="slot-time">${t}</div>
            <div class="slot-avail">${isFull ? 'Lleno' : avail + ' lugar' + (avail !== 1 ? 'es' : '') + ' libre'+(avail!==1?'s':'')}</div>
        `;
        if (!isFull) {
            btn.onclick = () => {
                state.selectedTime = t;
                document.getElementById('btnConfirmSlot').disabled = false;
                document.getElementById('slotError').classList.remove('show');
                refreshSlots();
            };
        }
        grid.appendChild(btn);
    });
}

// ══════════════════════════════════════════
//  STEPS NAV
// ══════════════════════════════════════════
function goStep(n) {
    if (n === 3) {
        if (!state.selectedTime) {
            showErr(document.getElementById('slotError'), 'Selecciona un horario.');
            return;
        }
        buildSummary();
    }
    state.currentStep = n;
    document.querySelectorAll('.step').forEach((el, i) => {
        el.classList.toggle('active', i + 1 === n);
    });
    updateProgress(n);
}

function updateProgress(n) {
    for (let i = 1; i <= 3; i++) {
        document.getElementById('seg' + i).classList.toggle('done', i <= n);
    }
}

// ══════════════════════════════════════════
//  SUMMARY
// ══════════════════════════════════════════
function buildSummary() {
    const u = state.user;
    const dayLabel = state.selectedDay.charAt(0).toUpperCase() + state.selectedDay.slice(1);
    const today = new Date();
    const days  = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
    const todayName = days[today.getDay()];
    // Próxima fecha del día elegido
    let daysAhead = (Object.keys(SCHEDULE_CONFIG).indexOf(state.selectedDay) + 1) - today.getDay();
    if (daysAhead <= 0) daysAhead += 7;
    const nextDate = new Date(today);
    nextDate.setDate(today.getDate() + daysAhead);
    const dateStr = nextDate.toLocaleDateString('es-CO', { day:'numeric', month:'long', year:'numeric' });

    document.getElementById('summaryContent').innerHTML = `
        <div class="summary-row"><span class="label">Usuario</span><span class="value">${u.name}</span></div>
        <div class="summary-row"><span class="label">Documento</span><span class="value">${u.document}</span></div>
        <div class="summary-row"><span class="label">Clase</span><span class="value">Semipersonalizado Diana</span></div>
        <div class="summary-row"><span class="label">Día</span><span class="value">${dayLabel}</span></div>
        <div class="summary-row"><span class="label">Horario</span><span class="value">${state.selectedTime}</span></div>
        <div class="summary-row"><span class="label">Próxima fecha</span><span class="value">${dateStr}</span></div>
        <div class="summary-row"><span class="label">Cupos disponibles</span>
            <span class="value">${MAX_PER_SLOT - countBookings(state.selectedDay, state.selectedTime)} de ${MAX_PER_SLOT}</span>
        </div>
    `;
}

// ══════════════════════════════════════════
//  RESERVAR
// ══════════════════════════════════════════
async function bookClass() {
    const btn     = document.getElementById('btnBook');
    const btnText = document.getElementById('btnBookText');
    const errEl   = document.getElementById('confirmError');
    errEl.classList.remove('show');

    // Re-check availability
    const avail = MAX_PER_SLOT - countBookings(state.selectedDay, state.selectedTime);
    if (avail <= 0) {
        showErr(errEl, 'Este horario ya se llenó. Por favor elige otro.');
        return;
    }

    // Check duplicado del usuario
    const already = state.bookings.find(b =>
        b.userId === state.user.id &&
        b.day    === state.selectedDay &&
        b.time   === state.selectedTime
    );
    if (already) {
        showErr(errEl, 'Ya tienes una reserva en este horario.');
        return;
    }

    btn.disabled = true;
    btnText.innerHTML = '<span class="spinner-sm"></span>Guardando...';

    const booking = {
        id:          generateId(),
        userId:      state.user.id,
        userName:    state.user.name,
        userDoc:     state.user.document,
        classType:   CLASS_TYPE,
        day:         state.selectedDay,
        time:        state.selectedTime,
        instructor:  'Diana',
        createdAt:   new Date().toISOString()
    };

    try {
        const payload = encodeURIComponent(btoa(unescape(encodeURIComponent(JSON.stringify(booking)))));
        const url     = `${SCRIPT_URL}?action=addClass&payload=${payload}`;
        const res     = await fetch(url, { redirect: 'follow' });
        const text    = await res.text();
        const match   = text.match(/\{[\s\S]*\}/);
        if (match) {
            const json = JSON.parse(match[0]);
            if (json.success === false) throw new Error(json.message || 'Error');
        }
        state.bookings.push(booking);
        document.getElementById('successMsg').textContent =
            `${state.user.name}, quedaste inscrito en Semipersonalizados Diana el ${state.selectedDay} a las ${state.selectedTime}. ¡Hasta pronto!`;
        goStep(4);
    } catch(e) {
        showErr(errEl, 'No se pudo guardar la reserva. Intenta de nuevo.');
        btn.disabled = false;
        btnText.textContent = 'Confirmar reserva';
    }
}

// ══════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════
function showErr(el, msg) { el.textContent = msg; el.classList.add('show'); }
function generateId() { return 'bk_' + Math.random().toString(36).substr(2, 9) + Date.now().toString(36); }

function resetFlow() {
    state = { currentStep:1, user:null, selectedDay:null, selectedTime:null, bookings: state.bookings };
    document.getElementById('loginDoc').value = '';
    document.getElementById('loginPass').value = '';
    document.getElementById('loginError').classList.remove('show');
    document.getElementById('userFoundCard').style.display = 'none';
    document.getElementById('btnIdentify').innerHTML = 'Continuar <i class="fas fa-arrow-right ms-1"></i>';
    document.getElementById('btnIdentify').disabled = false;
    document.getElementById('btnConfirmSlot').disabled = true;
    selectDay(Object.keys(SCHEDULE_CONFIG)[0]);
    goStep(1);
    loadBookings();
}
</script>
