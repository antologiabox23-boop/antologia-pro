<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programar Clase — Semipersonalizados Diana</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #27F9D4;
            --color-secondary: #FF729F;
            --color-accent: #F0F66E;
            --color-bg: #1a2332;
            --color-card: #273043;
            --color-border: #324466;
            --color-text: #f8f9fa;
            --color-muted: #8899aa;
            --color-success: #10b981;
            --color-danger: #ef4444;
            --color-warning: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--color-bg);
            color: var(--color-text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        /* ── HEADER ── */
        .page-header {
            background: linear-gradient(135deg, #1a2332 0%, #273043 100%);
            border-bottom: 2px solid var(--color-primary);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .page-header .logo { height: 40px; width: auto; filter: drop-shadow(0 0 6px rgba(39,249,212,.5)); }
        .page-header .title-block h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--color-primary);
            line-height: 1.1;
        }
        .page-header .title-block span {
            font-size: 0.8rem;
            color: var(--color-muted);
        }
        .badge-diana {
            background: linear-gradient(135deg, var(--color-primary), #1de5c0);
            color: #1a2332;
            font-weight: 700;
            font-size: 0.75rem;
            padding: 0.35em 0.75em;
            border-radius: 20px;
            margin-left: auto;
            white-space: nowrap;
        }

        /* ── MAIN CONTENT ── */
        .main-wrap {
            max-width: 520px;
            margin: 0 auto;
            padding: 2rem 1rem 3rem;
        }

        /* ── STEPS ── */
        .step { display: none; }
        .step.active { display: block; animation: fadeIn .3s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

        /* ── CARD ── */
        .sched-card {
            background: var(--color-card);
            border: 1px solid var(--color-border);
            border-radius: 16px;
            padding: 1.75rem;
            margin-bottom: 1.5rem;
        }
        .sched-card h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--color-primary);
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        /* ── FORM CONTROLS ── */
        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--color-muted);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: .04em;
        }
        .form-control, .form-select {
            background: #1a2332;
            border: 1.5px solid var(--color-border);
            color: var(--color-text);
            border-radius: 10px;
            padding: .6rem .9rem;
            font-size: .95rem;
            transition: border-color .2s, box-shadow .2s;
        }
        .form-control:focus, .form-select:focus {
            background: #1a2332;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(39,249,212,.15);
            color: var(--color-text);
        }
        .form-control::placeholder { color: #556677; }
        .form-select option { background: #1a2332; }

        /* ── SLOT GRID ── */
        .slots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: .6rem;
            margin-top: .5rem;
        }
        .slot-btn {
            background: #1a2332;
            border: 2px solid var(--color-border);
            border-radius: 10px;
            padding: .65rem .5rem;
            text-align: center;
            cursor: pointer;
            transition: all .2s;
            color: var(--color-text);
            font-size: .85rem;
            line-height: 1.3;
        }
        .slot-btn:hover:not(.full):not(.selected) {
            border-color: var(--color-primary);
            background: rgba(39,249,212,.08);
        }
        .slot-btn.selected {
            border-color: var(--color-primary);
            background: rgba(39,249,212,.18);
            color: var(--color-primary);
            font-weight: 600;
        }
        .slot-btn.full {
            opacity: .45;
            cursor: not-allowed;
            border-style: dashed;
        }
        .slot-btn .slot-time { font-weight: 700; font-size: .9rem; }
        .slot-btn .slot-avail { font-size: .72rem; color: var(--color-muted); margin-top: .15rem; }
        .slot-btn.selected .slot-avail { color: var(--color-primary); }

        /* ── DAY TABS ── */
        .day-tabs {
            display: flex;
            gap: .4rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .day-tab {
            background: #1a2332;
            border: 2px solid var(--color-border);
            border-radius: 8px;
            padding: .35rem .75rem;
            font-size: .82rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--color-muted);
            transition: all .2s;
        }
        .day-tab.active {
            background: rgba(39,249,212,.15);
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        /* ── USER INFO CARD ── */
        .user-found {
            background: rgba(16,185,129,.1);
            border: 1.5px solid var(--color-success);
            border-radius: 10px;
            padding: .85rem 1rem;
            display: flex;
            align-items: center;
            gap: .75rem;
            margin-top: 1rem;
        }
        .user-found .user-avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: #1a2332; font-size: 1rem;
            flex-shrink: 0;
        }
        .user-found .user-name { font-weight: 700; font-size: .95rem; }
        .user-found .user-detail { font-size: .78rem; color: var(--color-muted); }

        /* ── ERROR / ALERT ── */
        .alert-err {
            background: rgba(239,68,68,.12);
            border: 1.5px solid var(--color-danger);
            border-radius: 10px;
            padding: .7rem 1rem;
            font-size: .88rem;
            color: #fca5a5;
            display: none;
            margin-top: .75rem;
        }
        .alert-err.show { display: block; }

        /* ── BUTTONS ── */
        .btn-primary-custom {
            background: linear-gradient(135deg, var(--color-primary), #1de5c0);
            color: #1a2332;
            border: none;
            border-radius: 10px;
            padding: .75rem 1.5rem;
            font-weight: 700;
            font-size: 1rem;
            width: 100%;
            cursor: pointer;
            transition: opacity .2s, transform .1s;
        }
        .btn-primary-custom:hover { opacity: .9; transform: translateY(-1px); }
        .btn-primary-custom:disabled { opacity: .45; cursor: not-allowed; transform: none; }
        .btn-secondary-custom {
            background: transparent;
            border: 2px solid var(--color-border);
            color: var(--color-muted);
            border-radius: 10px;
            padding: .7rem 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
        }
        .btn-secondary-custom:hover { border-color: var(--color-primary); color: var(--color-primary); }

        /* ── SUMMARY ── */
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: .5rem 0;
            border-bottom: 1px solid var(--color-border);
            font-size: .9rem;
        }
        .summary-row:last-child { border-bottom: none; }
        .summary-row .label { color: var(--color-muted); }
        .summary-row .value { font-weight: 600; }

        /* ── SUCCESS ── */
        .success-icon {
            width: 72px; height: 72px;
            border-radius: 50%;
            background: rgba(16,185,129,.15);
            border: 3px solid var(--color-success);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2rem;
            color: var(--color-success);
        }

        /* ── LOADING ── */
        .spinner-sm {
            width: 18px; height: 18px;
            border: 2.5px solid rgba(26,35,50,.4);
            border-top-color: #1a2332;
            border-radius: 50%;
            animation: spin .6s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: .4rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── PROGRESS ── */
        .progress-bar-wrap {
            display: flex;
            gap: .4rem;
            margin-bottom: 1.5rem;
        }
        .progress-seg {
            flex: 1;
            height: 4px;
            border-radius: 2px;
            background: var(--color-border);
            transition: background .3s;
        }
        .progress-seg.done { background: var(--color-primary); }

        /* ── CAPTION ── */
        .caption { font-size: .78rem; color: var(--color-muted); margin-top: .4rem; }
    </style>
</head>
<body>

<!-- HEADER -->
<header class="page-header">
    <img src="images/logo.png" class="logo" alt="Antología" onerror="this.style.display='none'">
    <div class="title-block">
        <h1><i class="fas fa-dumbbell me-1"></i>Semipersonalizados</h1>
        <span>Programación de clases — Diana</span>
    </div>
    <div class="badge-diana"><i class="fas fa-star me-1"></i>Diana</div>
</header>

<!-- MAIN -->
<div class="main-wrap">

    <!-- PROGRESS -->
    <div class="progress-bar-wrap" id="progressBar">
        <div class="progress-seg done" id="seg1"></div>
        <div class="progress-seg" id="seg2"></div>
        <div class="progress-seg" id="seg3"></div>
    </div>

    <!-- ═══ STEP 1: IDENTIFICACIÓN ═══ -->
    <div class="step active" id="step1">
        <div class="sched-card">
            <h2><i class="fas fa-id-card"></i>Identificación</h2>
            <p class="caption mb-3">Ingresa tu usuario y contraseña para continuar.</p>

            <div class="mb-3">
                <label class="form-label">Número de documento</label>
                <input type="text" class="form-control" id="loginDoc"
                       placeholder="Ej. 1234567890" inputmode="numeric" autocomplete="off">
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña </label>
                <input type="password" class="form-control" id="loginPass"
                       placeholder="**********" inputmode="numeric" autocomplete="off">
            </div>

            <div class="alert-err" id="loginError"></div>

            <div id="userFoundCard" style="display:none;"></div>

            <div class="mt-3">
                <button class="btn-primary-custom" id="btnIdentify" onclick="handleIdentify()">
                    Continuar <i class="fas fa-arrow-right ms-1"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- ═══ STEP 2: SELECCIÓN DE CLASE ═══ -->
    <div class="step" id="step2">
        <div class="sched-card">
            <h2><i class="fas fa-calendar-alt"></i>Selecciona tu clase</h2>

            <!-- Día de la semana -->
            <label class="form-label">Día</label>
            <div class="day-tabs" id="dayTabs"></div>

            <!-- Slots de horario -->
            <label class="form-label">Horario disponible</label>
            <div class="slots-grid" id="slotsGrid"></div>
            <div class="alert-err" id="slotError"></div>
        </div>

        <div style="display:flex;gap:.75rem;">
            <button class="btn-secondary-custom" style="flex:0 0 auto;" onclick="goStep(1)">
                <i class="fas fa-arrow-left me-1"></i>Volver
            </button>
            <button class="btn-primary-custom" id="btnConfirmSlot" onclick="goStep(3)" disabled>
                Ver resumen <i class="fas fa-arrow-right ms-1"></i>
            </button>
        </div>
    </div>

    <!-- ═══ STEP 3: CONFIRMAR ═══ -->
    <div class="step" id="step3">
        <div class="sched-card">
            <h2><i class="fas fa-check-circle"></i>Confirmar reserva</h2>
            <div id="summaryContent"></div>
            <div class="alert-err" id="confirmError"></div>
        </div>
        <div style="display:flex;gap:.75rem;">
            <button class="btn-secondary-custom" style="flex:0 0 auto;" onclick="goStep(2)">
                <i class="fas fa-arrow-left me-1"></i>Cambiar
            </button>
            <button class="btn-primary-custom" id="btnBook" onclick="bookClass()">
                <span id="btnBookText">Confirmar reserva</span>
            </button>
        </div>
    </div>

    <!-- ═══ STEP 4: ÉXITO ═══ -->
    <div class="step" id="step4">
        <div class="sched-card" style="text-align:center; padding:2.5rem 1.75rem;">
            <div class="success-icon"><i class="fas fa-check"></i></div>
            <h2 style="justify-content:center; color: var(--color-success);">¡Reserva confirmada!</h2>
            <p style="color:var(--color-muted); font-size:.95rem; margin-bottom:1.5rem;" id="successMsg"></p>
            <button class="btn-primary-custom" onclick="resetFlow()">
                <i class="fas fa-plus me-2"></i>Nueva reserva
            </button>
        </div>
    <!-- ═══ STEP 4: ÉXITO ═══ -->
    <div class="step" id="step4">
        <div class="sched-card" style="text-align:center; padding:2.5rem 1.75rem;">
            <div class="success-icon"><i class="fas fa-check"></i></div>
            <h2 style="justify-content:center; color: var(--color-success);">¡Reserva confirmada!</h2>
            <p style="color:var(--color-muted); font-size:.95rem; margin-bottom:1.5rem;" id="successMsg"></p>
            <button class="btn-primary-custom" style="margin-bottom:.75rem" onclick="goMisClases()">
                <i class="fas fa-list me-2"></i>Ver mis clases
            </button>
            <button class="btn-secondary-custom" style="width:100%" onclick="resetFlow()">
                <i class="fas fa-plus me-2"></i>Nueva reserva
            </button>
        </div>
    </div>

    <!-- ═══ STEP 5: MIS CLASES ═══ -->
    <div class="step" id="step5">
        <div class="sched-card">
            <h2><i class="fas fa-calendar-check"></i>Mis Clases — Diana</h2>
            <div id="membershipBanner" style="display:none;margin-bottom:1rem;padding:.75rem 1rem;border-radius:10px;font-size:.85rem;font-weight:600;"></div>
            <div id="misClasesLoading" style="text-align:center;padding:1.5rem 0;color:var(--color-muted);">
                <i class="fas fa-spinner fa-spin me-2"></i>Cargando clases...
            </div>
            <div id="misClasesLista"></div>
        </div>
        <button class="btn-secondary-custom" style="width:100%;margin-top:.5rem" onclick="resetFlow()">
            <i class="fas fa-arrow-left me-1"></i>Volver al inicio
        </button>
    </div>

</div><!-- /main-wrap -->

<style>
.mc-card { background:#1a2332;border:1.5px solid var(--color-border);border-radius:12px;padding:1rem 1.1rem;margin-bottom:.75rem; }
.mc-card .mc-top { display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;margin-bottom:.4rem; }
.mc-card .mc-title { font-weight:700;font-size:.95rem;color:var(--color-text); }
.mc-card .mc-detail { font-size:.8rem;color:var(--color-muted);margin-top:.15rem; }
.mc-badge { font-size:.72rem;font-weight:700;padding:.25em .7em;border-radius:20px;white-space:nowrap;flex-shrink:0; }
.mc-badge.programada { background:rgba(39,249,212,.12);color:var(--color-secondary);border:1px solid var(--color-secondary); }
.mc-badge.cancelada  { background:rgba(239,68,68,.12);color:#ef4444;border:1px solid #ef4444; }
.mc-badge.cumplida   { background:rgba(16,185,129,.12);color:var(--color-success);border:1px solid var(--color-success); }

.mc-filter-btn.active { border-color:var(--color-primary);color:var(--color-primary);background:rgba(255,114,159,.1); }

<script>
// ══════════════════════════════════════════
//  CONFIGURACIÓN — DIANA
// ══════════════════════════════════════════
const SCHEDULE_CONFIG = {
    lunes:      ['06:00','07:00','08:00','09:00','17:00','18:00','19:00'],
    martes:     ['06:00','07:00','08:00','09:00','17:00','18:00','19:00'],
    'miércoles':['06:00','07:00','08:00','09:00','17:00','18:00','19:00'],
    jueves:     ['06:00','07:00','08:00','09:00','17:00','18:00','19:00'],
    viernes:    ['06:00','07:00','08:00','09:00','17:00','18:00','19:00'],
    'sábado':   ['08:00','09:00','10:00'],
};
const MAX_PER_SLOT = 4;
const CLASS_TYPE   = 'semipersonalizado_diana';
const SCRIPT_URL   = 'https://script.google.com/macros/s/AKfycbz9YubFTKIAFUXsQYoOh691HUytL7QwYZ9ZQL-WG0k2nab0w-_FzCCcX6Lm0SMC0TZA/exec';
const CANCEL_HOURS = 18;
// Tipos de pago en Ingresos que corresponden a clases Diana
const DIANA_INCOME_TYPES = ['semipersonalizado diana','personalizado diana','semipersonalizados diana','diana'];

// ══════════════════════════════════════════
//  ESTADO
// ══════════════════════════════════════════
let state = {
    currentStep:1, user:null, membership:null,
    selectedDay:null, selectedTime:null,
    bookings:[], misClases:[], mcFilter:'todas'
};

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
    buildDayTabs();
    loadBookings();
    document.getElementById('loginDoc').addEventListener('keydown', e=>{ if(e.key==='Enter') handleIdentify(); });
    document.getElementById('loginPass').addEventListener('keydown', e=>{ if(e.key==='Enter') handleIdentify(); });
});

async function gasCall(action, payload={}) {
    const data = encodeURIComponent(btoa(unescape(encodeURIComponent(JSON.stringify(payload)))));
    const url  = `${SCRIPT_URL}?action=${action}&payload=${data}`;
    const res  = await fetch(url, { redirect:'follow' });
    const text = await res.text();
    const m    = text.match(/\{[\s\S]*\}/);
    if (m) return JSON.parse(m[0]);
    throw new Error('Respuesta inválida');
}

async function loadBookings() {
    try {
        const json = await gasCall('getProgramacion', { classType: CLASS_TYPE });
        state.bookings = (json.data||json.classes||[]).filter(b=>b.classType===CLASS_TYPE);
    } catch(e) { state.bookings=[]; }
    refreshSlots();
}

// ══════════════════════════════════════════
//  INFERIR MEMBRESÍA
//  1° busca en hoja Membresias (checkMembership)
//  2° fallback: último ingreso tipo Diana en hoja Ingresos
//  Si encuentra en Ingresos y no en Membresias → auto-registra
// ══════════════════════════════════════════
async function resolverMembresia(userId, userDoc) {
    // Intento 1: hoja Membresias
    try {
        const r = await gasCall('checkMembership', { userId, userDoc });
        if (r.canBook || r.membership) return r;
    } catch(e) {}

    // Intento 2: hoja Ingresos
    try {
        const incR  = await gasCall('getIncome');
        const todos  = incR.data || [];
        const docClean = (userDoc||'').replace(/\D/g,'');

        const mios = todos.filter(p => {
            const pUid  = p.userId || '';
            const pDoc  = (p.userDoc||p.document||p.notes||'').replace(/\D/g,'');
            const byId  = userId  && pUid  === userId;
            const byDoc = docClean && (pDoc === docClean || (pUid||'').replace(/\D/g,'') === docClean);
            const tipoOk = DIANA_INCOME_TYPES.some(t =>
                (p.paymentType||'').toLowerCase().includes(t)
            );
            return (byId||byDoc) && tipoOk;
        });

        if (!mios.length) {
            return { success:true, canBook:false,
                reason:'Sin plan Diana activo. Contacta a tu instructora.',
                membership:null };
        }

        // Ordenar por endDate más reciente
        mios.sort((a,b) => new Date(b.endDate||'2000-01-01') - new Date(a.endDate||'2000-01-01'));
        const ult = mios[0];
        const hoy = new Date(); hoy.setHours(0,0,0,0);
        const fin = ult.endDate ? new Date(ult.endDate+'T12:00:00') : null;
        const vigente = fin && fin >= hoy;

        if (!vigente) {
            const finStr = ult.endDate || '?';
            return { success:true, canBook:false,
                reason:`Plan Diana venció el ${finStr}. Renueva con Diana.`,
                membership:null };
        }

        // Auto-registrar en Membresias (silencioso)
        gasCall('addMembership', {
            userId, userDoc,
            userName: state.user?.name || '',
            tipo: 'membresia_mensual',
            vigenciaDesde: ult.startDate || ult.paymentDate || '',
            vigenciaHasta: ult.endDate,
            estado: 'activa'
        }).catch(()=>{});

        return {
            success:true, canBook:true,
            reason:`Plan Diana vigente hasta ${ult.endDate}`,
            membership:{
                tipo:'membresia_mensual', vigenciaHasta:ult.endDate,
                vigenciaDesde: ult.startDate||ult.paymentDate||'',
                clasesTotal:'', clasesUsadas:'', estado:'activa',
                fromIncome:true
            }
        };
    } catch(e) {
        return { success:true, canBook:false, reason:'Error al verificar plan.', membership:null };
    }
}

// ══════════════════════════════════════════
//  IDENTIFICACIÓN
// ══════════════════════════════════════════
async function handleIdentify() {
    const doc   = (document.getElementById('loginDoc').value ||'').replace(/\D/g,'');
    const pass  = (document.getElementById('loginPass').value||'').replace(/\D/g,'');
    const errEl = document.getElementById('loginError');
    errEl.classList.remove('show');
    if (!doc||!pass) { showErr(errEl,'Completa todos los campos.'); return; }

    const btn = document.getElementById('btnIdentify');
    btn.innerHTML = '<span class="spinner-sm"></span>Verificando...';
    btn.disabled  = true;

    try {
        const json  = await gasCall('getUsers');
        const users = json.data||json.users||[];
        const found = users.find(u=>
            (u.document||'').replace(/\D/g,'')=== doc &&
            (u.phone   ||'').replace(/\D/g,'')=== pass &&
            u.status==='active'
        );
        if (!found) {
            showErr(errEl,'Documento o contraseña incorrectos, o usuario inactivo.');
            btn.innerHTML = 'Continuar <i class="fas fa-arrow-right ms-1"></i>';
            btn.disabled  = false;
            return;
        }
        state.user = found;

        const memJson = await resolverMembresia(found.id, found.document);
        state.membership = memJson;

        if (!memJson.canBook) {
            showErr(errEl, '⚠️ '+memJson.reason);
            btn.innerHTML = 'Continuar <i class="fas fa-arrow-right ms-1"></i>';
            btn.disabled  = false;
            showUserCard(found, memJson, false);
            return;
        }
        showUserCard(found, memJson, true);
        setTimeout(()=>goStep(2), 800);
    } catch(e) {
        showErr(errEl,'Error de conexión. Intenta de nuevo.');
        btn.innerHTML = 'Continuar <i class="fas fa-arrow-right ms-1"></i>';
        btn.disabled  = false;
    }
}

function showUserCard(u, mem, canBook) {
    const initial = (u.name||'?').charAt(0).toUpperCase();
    const el = document.getElementById('userFoundCard');
    el.style.display = 'flex';
    el.className = 'user-found';
    const fromTag = mem?.membership?.fromIncome
        ? `<span style="font-size:.65rem;background:rgba(240,246,110,.12);border:1px solid var(--color-accent);color:var(--color-accent);border-radius:4px;padding:.1rem .35rem;margin-left:.4rem;">desde Ingresos</span>`
        : '';
    const memInfo = mem ? `<div style="font-size:.75rem;color:${mem.canBook?'var(--color-secondary)':'#fca5a5'};margin-top:.2rem;">
        <i class="fas fa-${mem.canBook?'check-circle':'exclamation-triangle'} me-1"></i>${mem.reason||'Sin plan activo'}${fromTag}
    </div>` : '';
    const verBtn = !canBook ? `<button onclick="goMisClases()" style="margin-top:.5rem;font-size:.8rem;background:transparent;border:1.5px solid var(--color-primary);color:var(--color-primary);border-radius:8px;padding:.3rem .8rem;cursor:pointer;width:100%">
        <i class="fas fa-list me-1"></i>Ver mis clases</button>` : '';
    el.innerHTML = `
        <div class="user-avatar">${initial}</div>
        <div style="flex:1">
            <div class="user-name">${u.name}</div>
            <div class="user-detail"><i class="fas fa-id-card me-1"></i>${u.document}</div>
            ${memInfo}${verBtn}
        </div>
        <i class="fas fa-${canBook?'check-circle':'times-circle'} ms-auto" style="color:var(--color-${canBook?'success':'danger'});font-size:1.3rem;align-self:flex-start;"></i>
    `;
}

// ══════════════════════════════════════════
//  DÍAS & SLOTS
// ══════════════════════════════════════════
function buildDayTabs() {
    const days = Object.keys(SCHEDULE_CONFIG);
    const cont = document.getElementById('dayTabs');
    cont.innerHTML = '';
    days.forEach((d,i) => {
        const btn = document.createElement('button');
        btn.className = 'day-tab'+(i===0?' active':'');
        btn.textContent = d.charAt(0).toUpperCase()+d.slice(1);
        btn.onclick = ()=>selectDay(d);
        cont.appendChild(btn);
    });
    state.selectedDay = days[0];
    refreshSlots();
}

function selectDay(day) {
    state.selectedDay  = day;
    state.selectedTime = null;
    document.querySelectorAll('.day-tab').forEach(b=>{
        b.classList.toggle('active', b.textContent.toLowerCase()===day.toLowerCase());
    });
    document.getElementById('btnConfirmSlot').disabled = true;
    refreshSlots();
}

function countBookings(day, time) {
    return state.bookings.filter(b=>b.day===day&&b.time===time&&b.status!=='cancelada').length;
}

function refreshSlots() {
    const grid = document.getElementById('slotsGrid');
    if (!grid) return;
    const times = SCHEDULE_CONFIG[state.selectedDay]||[];
    grid.innerHTML = '';
    if (!times.length) { grid.innerHTML='<p class="caption">Sin horarios este día.</p>'; return; }
    times.forEach(t=>{
        const taken  = countBookings(state.selectedDay, t);
        const avail  = MAX_PER_SLOT-taken;
        const isFull = avail<=0;
        const isSel  = state.selectedTime===t;
        const div    = document.createElement('div');
        div.className = 'slot-btn'+(isFull?' full':'')+(isSel?' selected':'');
        div.innerHTML = `<div class="slot-time">${t}</div>
            <div class="slot-avail">${isFull?'Lleno':avail+' lugar'+(avail!==1?'es':'')+' libre'+(avail!==1?'s':'')}</div>`;
        if (!isFull) {
            div.onclick = ()=>{
                state.selectedTime = t;
                document.getElementById('btnConfirmSlot').disabled = false;
                document.getElementById('slotError').classList.remove('show');
                refreshSlots();
            };
        }
        grid.appendChild(div);
    });
}

// ══════════════════════════════════════════
//  NAVEGACIÓN
// ══════════════════════════════════════════
function goStep(n) {
    if (n===3) {
        if (!state.selectedTime) { showErr(document.getElementById('slotError'),'Selecciona un horario.'); return; }
        buildSummary();
    }
    state.currentStep = n;
    for (let i=1;i<=5;i++) {
        const el = document.getElementById('step'+i);
        if (el) el.classList.toggle('active', i===n);
    }
    updateProgress(n);
    window.scrollTo({top:0, behavior:'smooth'});
}

function updateProgress(n) {
    for (let i=1;i<=3;i++) {
        const el = document.getElementById('seg'+i);
        if (el) el.classList.toggle('done', i<n||(i===n&&n<=3));
    }
}

// ══════════════════════════════════════════
//  RESUMEN
// ══════════════════════════════════════════
function buildSummary() {
    const u = state.user;
    const dayLabel = state.selectedDay.charAt(0).toUpperCase()+state.selectedDay.slice(1);
    const dayMap   = {lunes:1,martes:2,'miércoles':3,jueves:4,viernes:5,'sábado':6,domingo:0};
    const today    = new Date();
    let diff = (dayMap[state.selectedDay]??0)-today.getDay();
    if (diff<=0) diff+=7;
    const nextDate = new Date(today); nextDate.setDate(today.getDate()+diff);
    const dateStr  = nextDate.toLocaleDateString('es-CO',{day:'numeric',month:'long',year:'numeric'});
    const memLine  = state.membership
        ? `<div class="summary-row"><span class="label">Plan</span><span class="value" style="font-size:.82rem;color:var(--color-secondary);">${state.membership.reason}</span></div>`
        : '';
    document.getElementById('summaryContent').innerHTML = `
        <div class="summary-row"><span class="label">Usuario</span><span class="value">${u.name}</span></div>
        <div class="summary-row"><span class="label">Documento</span><span class="value">${u.document}</span></div>
        ${memLine}
        <div class="summary-row"><span class="label">Instructora</span><span class="value">⭐ Diana</span></div>
        <div class="summary-row"><span class="label">Día</span><span class="value">${dayLabel}</span></div>
        <div class="summary-row"><span class="label">Horario</span><span class="value">${state.selectedTime}</span></div>
        <div class="summary-row"><span class="label">Próxima fecha</span><span class="value">${dateStr}</span></div>
        <div class="summary-row"><span class="label">Cupos disponibles</span>
            <span class="value">${MAX_PER_SLOT-countBookings(state.selectedDay,state.selectedTime)} de ${MAX_PER_SLOT}</span></div>
    `;
}

// ══════════════════════════════════════════
//  RESERVAR
// ══════════════════════════════════════════
async function bookClass() {
    const btn     = document.getElementById('btnBook');
    const btnText = document.getElementById('btnBookText');
    const errEl   = document.getElementById('confirmError');
    errEl.classList.remove('show');

    const avail = MAX_PER_SLOT-countBookings(state.selectedDay, state.selectedTime);
    if (avail<=0) { showErr(errEl,'Este horario ya se llenó.'); return; }

    btn.disabled = true;
    btnText.innerHTML = '<span class="spinner-sm"></span>Guardando...';

    const dayMap = {lunes:1,martes:2,'miércoles':3,jueves:4,viernes:5,'sábado':6,domingo:0};
    const today  = new Date();
    let diff = (dayMap[state.selectedDay]??0)-today.getDay();
    if (diff<=0) diff+=7;
    const cd = new Date(today); cd.setDate(today.getDate()+diff);
    const classDateStr = cd.toISOString().split('T')[0];

    const booking = {
        userId:    state.user.id,
        userName:  state.user.name,
        userDoc:   state.user.document,
        classType: CLASS_TYPE,
        level:     '',
        day:       state.selectedDay,
        time:      state.selectedTime,
        classDate: classDateStr,
        instructor:'Diana'
    };

    try {
        const json = await gasCall('addClass', booking);
        if (json.success===false) throw new Error(json.message||'Error al guardar');
        state.bookings.push({ ...booking, status:'programada', ID:json.bookingId||'' });
        document.getElementById('successMsg').textContent =
            `${state.user.name}, quedaste en Semipersonalizados Diana el ${state.selectedDay} a las ${state.selectedTime}. ¡Hasta pronto!`;
        goStep(4);
    } catch(e) {
        showErr(errEl, e.message||'No se pudo guardar la reserva.');
        btn.disabled = false;
        btnText.textContent = 'Confirmar reserva';
    }
}

// ══════════════════════════════════════════
//  MIS CLASES
// ══════════════════════════════════════════
async function goMisClases() {
    if (!state.user) return;
    goStep(5);
    document.getElementById('misClasesLoading').style.display = 'block';
    document.getElementById('misClasesLista').innerHTML = '';
    try {
        const json = await gasCall('getUserClasses', { userId:state.user.id, userDoc:state.user.document });
        state.misClases = (json.classes||[]).filter(c=>c.classType===CLASS_TYPE);
    } catch(e) { state.misClases=[]; }

    if (state.membership) {
        const banner = document.getElementById('membershipBanner');
        banner.style.display = 'block';
        const ok = state.membership.canBook;
        banner.style.cssText = `display:block;margin-bottom:1rem;padding:.75rem 1rem;border-radius:10px;font-size:.85rem;font-weight:600;background:rgba(${ok?'39,249,212':'239,68,68'},.1);border:1.5px solid ${ok?'var(--color-secondary)':'#ef4444'};color:${ok?'var(--color-secondary)':'#fca5a5'};`;
        banner.innerHTML = `<i class="fas fa-id-badge me-1"></i>${state.membership.reason}`;
    }

    document.getElementById('misClasesLoading').style.display = 'none';
    renderMisClases();
}

function renderMisClases() {
    const lista  = document.getElementById('misClasesLista');
    const filter = state.mcFilter;
    const all    = state.misClases;
    if (!all.length) {
        lista.innerHTML = '<div class="mc-empty"><i class="fas fa-calendar-times fa-2x mb-2" style="display:block;"></i>No tienes clases registradas aún.</div>';
        return;
    }
    const prog   = all.filter(c=>c.status==='programada').length;
    const cumpl  = all.filter(c=>c.status==='cumplida').length;
    const cancel = all.filter(c=>c.status==='cancelada').length;
    const filtered = filter==='todas' ? all : all.filter(c=>c.status===filter);
    lista.innerHTML = `
        <div class="mc-stats">
            <div class="mc-stat"><div class="val" style="color:var(--color-secondary)">${prog}</div><div class="lbl">Programadas</div></div>
            <div class="mc-stat"><div class="val" style="color:var(--color-success)">${cumpl}</div><div class="lbl">Cumplidas</div></div>
            <div class="mc-stat"><div class="val" style="color:#ef4444">${cancel}</div><div class="lbl">Canceladas</div></div>
        </div>
        <div class="mc-filter">
            <button class="mc-filter-btn ${filter==='todas'?'active':''}"      onclick="setMcFilter('todas')">Todas</button>
            <button class="mc-filter-btn ${filter==='programada'?'active':''}" onclick="setMcFilter('programada')">Programadas</button>
            <button class="mc-filter-btn ${filter==='cumplida'?'active':''}"   onclick="setMcFilter('cumplida')">Cumplidas</button>
            <button class="mc-filter-btn ${filter==='cancelada'?'active':''}"  onclick="setMcFilter('cancelada')">Canceladas</button>
        </div>
        ${filtered.length===0 ? '<div class="mc-empty">Sin clases en este filtro.</div>' :
          filtered.map(c=>renderClaseCard(c)).join('')}
    `;
}

function renderClaseCard(c) {
    const fecha = c.classDate ? new Date(c.classDate+'T12:00:00').toLocaleDateString('es-CO',{weekday:'short',day:'numeric',month:'short'}) : c.day;
    let canCancel=false, cancelTip='';
    if (c.status==='programada' && c.classDate && c.time) {
        const dt  = new Date(c.classDate+'T'+c.time+':00');
        const hrs = (dt-new Date())/3600000;
        canCancel = hrs>=18;
        if (!canCancel) cancelTip=`(faltan ${Math.round(hrs)}h, mínimo 18h)`;
    }
    const cancelBtn = c.status==='programada' ? `
        <button class="mc-cancel-btn" ${canCancel?'':'disabled'} onclick="cancelarClase('${c.ID}',this)"
            title="${canCancel?'Cancelar esta clase':cancelTip}">
            <i class="fas fa-times me-1"></i>${canCancel?'Cancelar':cancelTip||'No cancelable'}
        </button>` : '';
    const createdStr = c.createdAt ? new Date(c.createdAt).toLocaleDateString('es-CO',{day:'numeric',month:'short',year:'numeric'}) : '';
    return `
    <div class="mc-card" id="mc_${c.ID}">
        <div class="mc-top">
            <div>
                <div class="mc-title">⭐ Semipersonalizados Diana</div>
                <div class="mc-detail"><i class="fas fa-calendar me-1"></i>${fecha} a las ${c.time}</div>
                ${createdStr?`<div class="mc-detail" style="font-size:.72rem;margin-top:.3rem;"><i class="fas fa-clock me-1"></i>Reservado el ${createdStr}</div>`:''}
                ${c.cancelReason&&c.status==='cancelada'?`<div class="mc-detail" style="color:#fca5a5;margin-top:.2rem;"><i class="fas fa-info-circle me-1"></i>${c.cancelReason}</div>`:''}
            </div>
            <span class="mc-badge ${c.status}">${c.status==='programada'?'Programada':c.status==='cumplida'?'Cumplida':'Cancelada'}</span>
        </div>
        ${cancelBtn}
    </div>`;
}

function setMcFilter(f) { state.mcFilter=f; renderMisClases(); }

async function cancelarClase(bookingId, btnEl) {
    if (!confirm('¿Seguro que deseas cancelar esta clase?')) return;
    btnEl.disabled = true;
    btnEl.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i>Cancelando...';
    try {
        const json = await gasCall('cancelClass', { bookingId, reason:'Cancelado por el usuario' });
        if (json.success===false) throw new Error(json.message);
        const cls = state.misClases.find(c=>c.ID===bookingId);
        if (cls) cls.status='cancelada';
        renderMisClases();
    } catch(e) {
        alert('No se pudo cancelar: '+(e.message||'Error desconocido'));
        btnEl.disabled = false;
        btnEl.innerHTML = '<i class="fas fa-times me-1"></i>Cancelar';
    }
}

// ══════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════
function showErr(el, msg) { el.textContent=msg; el.classList.add('show'); }

function resetFlow() {
    state = { currentStep:1, user:null, membership:null, selectedDay:null, selectedTime:null,
              bookings:state.bookings, misClases:[], mcFilter:'todas' };
    document.getElementById('loginDoc').value  = '';
    document.getElementById('loginPass').value = '';
    document.getElementById('loginError').classList.remove('show');
    document.getElementById('userFoundCard').style.display = 'none';
    document.getElementById('btnIdentify').innerHTML = 'Continuar <i class="fas fa-arrow-right ms-1"></i>';
    document.getElementById('btnIdentify').disabled  = false;
    document.getElementById('btnConfirmSlot').disabled = true;
    document.getElementById('membershipBanner').style.display = 'none';
    buildDayTabs();
    goStep(1);
    loadBookings();
}
</script>
